<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Cursos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1f2937;--border:#2d3748;
  --text:#e2e8f0;--text2:#94a3b8;--accent:#f97316;--accent2:#ea580c;
  --green:#10b981;--blue:#3b82f6;--yellow:#f59e0b;--purple:#8b5cf6;
  --teal:#14b8a6;--red:#ef4444;--r:10px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
a{text-decoration:none}

/* ── UTILS ── */
.hidden{display:none!important}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%}

/* ── LOGIN ── */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(59,130,246,.05) 0%,transparent 55%)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand .logo-icon{font-size:40px;margin-bottom:12px;display:block}
.login-brand h1{font-size:24px;color:var(--text);margin-bottom:4px}
.login-brand p{color:var(--text2);font-size:14px}
.login-form{display:flex;flex-direction:column;gap:14px}
.inp-group{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0 14px;color:var(--text2);transition:border-color .15s}
.inp-group:focus-within{border-color:var(--accent)}
.inp-group span{font-size:17px;flex-shrink:0}
.inp-group input{flex:1;background:none;border:none;outline:none;color:var(--text);padding:13px 0;font-size:15px}
.login-err{color:var(--red);font-size:13px;text-align:center;display:none}

/* ── APP LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:10px;padding:22px 18px;border-bottom:1px solid var(--border);color:var(--accent)}
.sb-brand .ico{font-size:26px}
.sb-brand h2{font-size:15px;color:var(--text);line-height:1.2}
.sb-brand small{color:var(--text2);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:400}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text2);background:none;border:none;cursor:pointer;font-size:14px;font-weight:500;width:100%;transition:all .15s;text-align:left}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:rgba(249,115,22,.15);color:var(--accent)}
.nav-btn .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px;border-top:1px solid var(--border)}
.sb-email{display:block;font-size:11px;color:var(--text2);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;overflow-y:auto}

/* ── PAGE ── */
.page{padding:28px 32px;max-width:1100px;animation:fadeIn .2s ease}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.page-hdr h1{font-size:24px}
.page-hdr p{color:var(--text2);font-size:13px;margin-top:3px}
.hdr-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 13px;font-size:13px}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--border)}
.btn-red:hover{border-color:var(--red)}
.btn-full{width:100%;justify-content:center;padding:14px;font-size:16px;margin-top:6px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:13px}
.stat-ico{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.c-blue .stat-ico{background:rgba(59,130,246,.12);color:var(--blue)}
.c-green .stat-ico{background:rgba(16,185,129,.12);color:var(--green)}
.c-yellow .stat-ico{background:rgba(245,158,11,.12);color:var(--yellow)}
.c-purple .stat-ico{background:rgba(139,92,246,.12);color:var(--purple)}
.c-teal .stat-ico{background:rgba(20,184,166,.12);color:var(--teal)}
.c-red .stat-ico{background:rgba(239,68,68,.12);color:var(--red)}
.c-orange .stat-ico{background:rgba(249,115,22,.12);color:var(--accent)}
.stat-val{display:block;font-size:20px;font-weight:700;font-family:'Syne',sans-serif}
.stat-lbl{display:block;font-size:12px;color:var(--text2);margin-top:1px}

/* ── TABLE ── */
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead{background:var(--bg3)}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);white-space:nowrap}
td{padding:11px 14px;border-top:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
.empty-row{text-align:center;color:var(--text2);padding:48px!important}

/* ── BADGES ── */
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-green{background:rgba(16,185,129,.12);color:var(--green)}
.b-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.b-yellow{background:rgba(245,158,11,.12);color:var(--yellow)}
.b-purple{background:rgba(139,92,246,.12);color:var(--purple)}
.b-teal{background:rgba(20,184,166,.12);color:var(--teal)}
.b-orange{background:rgba(249,115,22,.12);color:var(--accent)}

/* ── STATUS SELECT ── */
.sts-sel{padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;outline:none;background:var(--bg3);color:var(--text)}
.sts-pago_pix{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.2)}
.sts-pago_cartao{background:rgba(59,130,246,.1);color:var(--blue);border-color:rgba(59,130,246,.2)}
.sts-pendente{background:rgba(245,158,11,.1);color:var(--yellow);border-color:rgba(245,158,11,.2)}
.sts-cortesia{background:rgba(139,92,246,.1);color:var(--purple);border-color:rgba(139,92,246,.2)}

/* ── FILTERS ── */
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0 12px;flex:1;min-width:200px;color:var(--text2)}
.search-box:focus-within{border-color:var(--accent)}
.search-box input{background:none;border:none;outline:none;color:var(--text);padding:10px 0;width:100%;font-size:14px}
.filter-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;cursor:pointer;outline:none}

/* ── LINK CARD ── */
.link-card{display:flex;align-items:center;gap:20px;background:var(--bg2);border:1px solid rgba(249,115,22,.25);border-radius:var(--r);padding:18px 22px;margin-bottom:22px;flex-wrap:wrap}
.link-info{flex:1;display:flex;flex-direction:column;gap:8px;min-width:180px}
.link-lbl{font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.link-url{font-size:13px;color:var(--accent);background:rgba(249,115,22,.07);padding:8px 12px;border-radius:6px;word-break:break-all;font-family:monospace}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 48px rgba(0,0,0,.6)}
.modal h2{font-size:19px;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}

/* ── GASTOS ── */
.gastos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.gasto-cat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.gasto-cat-hdr{display:flex;justify-content:space-between;padding:13px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.gasto-cat-name{font-weight:600;font-size:14px}
.gasto-cat-total{font-weight:700;color:var(--accent);font-family:'Syne',sans-serif}
.gasto-item{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-top:1px solid var(--border)}
.gasto-desc{font-size:13.5px}
.gasto-val{font-weight:600;font-family:'Syne',sans-serif;font-size:13px;margin-right:8px}

/* ── MATERIAIS ── */
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.mat-cat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.mat-cat-title{padding:12px 16px;font-size:13px;font-weight:700;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
.mat-list{padding:8px;display:flex;flex-direction:column;gap:4px}
.mat-item{display:flex;justify-content:space-between;align-items:flex-start;padding:11px;border-radius:7px;background:rgba(255,255,255,.02);border:1px solid var(--border)}
.mat-info{flex:1;display:flex;flex-direction:column;gap:3px}
.mat-nome{font-size:13.5px;font-weight:600}
.mat-desc{font-size:12px;color:var(--text2)}
.mat-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);margin-top:3px}
.mat-link:hover{text-decoration:underline}

/* ── CONFIG ── */
.config-sections{display:flex;flex-direction:column;gap:22px}
.config-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px}
.config-sec h2{font-size:15px;margin-bottom:18px;padding-bottom:11px;border-bottom:1px solid var(--border);color:var(--text2)}

/* ── BALANCE ── */
.balance{padding:8px 16px;border-radius:8px;font-weight:700;font-family:'Syne',sans-serif;font-size:15px}
.balance.pos{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.balance.neg{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.total-tag{padding:8px 16px;border-radius:8px;font-weight:700;font-family:'Syne',sans-serif;font-size:14px;background:rgba(249,115,22,.1);color:var(--accent);border:1px solid rgba(249,115,22,.2)}

/* ── EMPTY ── */
.empty{text-align:center;padding:56px 20px;color:var(--text2)}
.empty .ico{font-size:48px;opacity:.3;margin-bottom:14px}
.empty p{font-size:15px}

/* ── ICON BTN ── */
.ico-btn{padding:6px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.ico-btn:hover{border-color:var(--red);color:var(--red)}
.ico-btn.edit:hover{border-color:var(--blue);color:var(--blue)}

/* ── PUBLIC PAGE ── */
#public-page{min-height:100vh;background:var(--bg);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;background-image:radial-gradient(ellipse at 20% 0%,rgba(249,115,22,.08) 0%,transparent 50%)}
.pub-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:580px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.pub-hdr{padding:30px;background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(59,130,246,.06));border-bottom:1px solid var(--border);text-align:center}
.pub-hdr .ico{font-size:40px;margin-bottom:10px;display:block}
.pub-hdr h1{font-size:22px;color:var(--text);margin-bottom:8px}
.pub-desc{color:var(--text2);font-size:14px;margin-bottom:14px}
.pub-meta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-size:13px;color:var(--text2)}
.pub-form{padding:26px}
.pub-form h2{font-size:17px;margin-bottom:18px}
.radio-group{display:flex;gap:10px;flex-wrap:wrap;padding:2px 0}
.radio-opt{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:14px;color:var(--text);padding:8px 13px;border:1px solid var(--border);border-radius:8px;transition:all .15s}
.radio-opt.selected{border-color:var(--accent);background:rgba(249,115,22,.08);color:var(--accent)}

/* ── CONFIRM ── */
.confirm-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;padding:38px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.confirm-ico{font-size:54px;margin-bottom:14px}
.confirm-card h1{font-size:24px;margin-bottom:10px}
.confirm-card .sub{color:var(--text2);font-size:15px;margin-bottom:6px}
.pix-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:var(--r);padding:18px;margin:18px 0;text-align:left}
.pix-box-hdr{font-weight:700;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pix-lbl{font-size:12px;color:var(--text2);margin-bottom:4px}
.pix-key-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pix-key-row code{flex:1;background:var(--bg3);padding:8px 12px;border-radius:6px;font-size:13px;word-break:break-all}
.pix-obs{font-size:12px;color:var(--text2);font-style:italic;margin-top:10px}
.cartao-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:var(--r);padding:18px;margin:18px 0}
.cartao-box-hdr{font-weight:700;font-size:14px;margin-bottom:12px}
.info-box{margin-top:20px;background:var(--bg3);border-radius:9px;padding:14px;display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--text2);text-align:left}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:10px;font-size:14px;z-index:9999;animation:fadeIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:300px}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
.toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  #app{flex-direction:column}
  .sidebar{width:100%;height:auto}
  .sb-nav{flex-direction:row;overflow-x:auto;padding:8px}
  .nav-btn span{display:none}
  .nav-btn{justify-content:center;padding:10px}
  .page{padding:16px}
  .form-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ════════════════════════════════ LOADING ════════════════════════════════ -->
<div id="loading-screen">
  <div class="spinner spin"></div>
  <p style="color:var(--text2);font-size:14px;margin-top:8px">Carregando...</p>
</div>

<!-- ════════════════════════════════ LOGIN ════════════════════════════════ -->
<div id="login-page" class="hidden">
  <div class="login-card">
    <div class="login-brand">
      <span class="logo-icon">🎓</span>
      <h1>Gestor de Cursos</h1>
      <p>Painel administrativo</p>
    </div>
    <div class="login-form">
      <div class="inp-group">
        <span>✉️</span>
        <input type="email" id="login-email" placeholder="Email" />
      </div>
      <div class="inp-group">
        <span>🔒</span>
        <input type="password" id="login-pass" placeholder="Senha" />
      </div>
      <p class="login-err" id="login-err">Email ou senha incorretos</p>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════ APP ════════════════════════════════ -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="sb-brand">
      <span class="ico">🎓</span>
      <div>
        <h2>Gestor de Cursos</h2>
        <small>OrtoFlix</small>
      </div>
    </div>
    <nav class="sb-nav">
      <button class="nav-btn active" data-page="dashboard" onclick="goTo('dashboard')"><span class="ico">📊</span><span>Dashboard</span></button>
      <button class="nav-btn" data-page="inscricoes" onclick="goTo('inscricoes')"><span class="ico">👥</span><span>Inscrições</span></button>
      <button class="nav-btn" data-page="gastos" onclick="goTo('gastos')"><span class="ico">💰</span><span>Gastos</span></button>
      <button class="nav-btn" data-page="materiais" onclick="goTo('materiais')"><span class="ico">📁</span><span>Materiais</span></button>
      <button class="nav-btn" data-page="config" onclick="goTo('config')"><span class="ico">⚙️</span><span>Config. Curso</span></button>
    </nav>
    <div class="sb-foot">
      <span class="sb-email" id="sb-email"></span>
      <button class="btn btn-outline btn-sm" style="width:100%" onclick="doLogout()">🚪 Sair</button>
    </div>
  </aside>

  <main class="main" id="main-content"></main>
</div>

<!-- ════════════════════════════════ PUBLIC PAGE ════════════════════════════════ -->
<div id="public-page" class="hidden"></div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE CONFIG — substitua pelos seus dados
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAq9ix8gVMn8lr7xtx49yUCDDI4fnpUuiI",
  authDomain: "cursomanager-53218.firebaseapp.com",
  projectId: "cursomanager-53218",
  storageBucket: "cursomanager-53218.firebasestorage.app",
  messagingSenderId: "250558746109",
  appId: "1:250558746109:web:ed58b1388c7940103ddd94"
};

firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

// ── STATE ──
let curso = null;
let inscricoes = [];
let gastos = [];
let materiais = [];
let unsubInsc, unsubGastos, unsubMat, unsubCurso;

// ── HELPERS ──
function show(id){ document.getElementById(id).classList.remove('hidden') }
function hide(id){ document.getElementById(id).classList.add('hidden') }
function toast(msg, type='ok'){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
function fmtBRL(v){ return 'R$ ' + (parseFloat(v)||0).toFixed(2).replace('.',',') }
function statusLabel(s){ return {pago_pix:'Pago PIX',pago_cartao:'Pago Cartão',pendente:'Pendente',cortesia:'Cortesia'}[s]||s }
function statusClass(s){ return {pago_pix:'b-green',pago_cartao:'b-blue',pendente:'b-yellow',cortesia:'b-purple'}[s]||'' }

// ── DETECT PUBLIC ROUTE ──
const isPublic = window.location.hash === '#/inscricao' || window.location.search.includes('inscricao');

// ── AUTH ──
auth.onAuthStateChanged(user => {
  hide('loading-screen');
  if(isPublic){ showPublicPage(); return; }
  if(user){
    document.getElementById('sb-email').textContent = user.email;
    show('app');
    startListeners();
    goTo('dashboard');
  } else {
    show('login-page');
  }
});

function doLogin(){
  const email = document.getElementById('login-email').value;
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  btn.textContent = 'Entrando...'; btn.disabled = true; err.style.display='none';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(()=>{ err.style.display='block'; btn.textContent='Entrar'; btn.disabled=false; });
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter' && !document.getElementById('login-page').classList.contains('hidden')) doLogin(); });

function doLogout(){
  auth.signOut();
  if(unsubInsc) unsubInsc();
  if(unsubGastos) unsubGastos();
  if(unsubMat) unsubMat();
  if(unsubCurso) unsubCurso();
  hide('app'); show('login-page');
}

// ── LISTENERS ──
function startListeners(){
  unsubCurso = db.collection('config').doc('curso').onSnapshot(snap => {
    curso = snap.exists ? snap.data() : null;
    if(currentPage === 'dashboard') renderDashboard();
    if(currentPage === 'config') renderConfig();
  });
  unsubInsc = db.collection('inscricoes').onSnapshot(snap => {
    inscricoes = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
      const ta = a.criadoEm?.seconds||0;
      const tb = b.criadoEm?.seconds||0;
      return tb - ta;
    });
    if(currentPage === 'inscricoes') renderInscricoes();
    if(currentPage === 'dashboard') renderDashboard();
  });
  unsubGastos = db.collection('gastos').onSnapshot(snap => {
    gastos = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage === 'gastos') renderGastos();
    if(currentPage === 'dashboard') renderDashboard();
  });
  unsubMat = db.collection('materiais').onSnapshot(snap => {
    materiais = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage === 'materiais') renderMateriais();
  });
}

// ── NAVIGATION ──
let currentPage = '';
function goTo(page){
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.page === page);
  });
  const fns = { dashboard: renderDashboard, inscricoes: renderInscricoes, gastos: renderGastos, materiais: renderMateriais, config: renderConfig };
  if(fns[page]) fns[page]();
}

// ══════════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════════
function renderDashboard(){
  const pagos   = inscricoes.filter(i=>i.status==='pago_pix'||i.status==='pago_cartao');
  const pend    = inscricoes.filter(i=>i.status==='pendente');
  const cort    = inscricoes.filter(i=>i.status==='cortesia');
  const totalG  = gastos.reduce((s,g)=>s+(g.valor||0),0);
  const receita = pagos.length * (parseFloat(curso?.valor)||0);
  const saldo   = receita - totalG;
  const recentes = inscricoes.slice(0,5);

  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div>
        <h1>${curso?.nome||'Nenhum curso configurado'}</h1>
        <p>${curso ? (curso.data||'') + (curso.local ? ' · '+curso.local : '') : 'Configure um curso em ⚙️ Config. Curso'}</p>
      </div>
      <div class="${saldo>=0?'balance pos':'balance neg'}">Saldo: ${fmtBRL(saldo)}</div>
    </div>

    <div class="stats-grid">
      <div class="stat c-blue"><div class="stat-ico">👥</div><div><span class="stat-val">${inscricoes.length}</span><span class="stat-lbl">Total Inscritos</span></div></div>
      <div class="stat c-green"><div class="stat-ico">✅</div><div><span class="stat-val">${pagos.length}</span><span class="stat-lbl">Pagamentos Conf.</span></div></div>
      <div class="stat c-yellow"><div class="stat-ico">⏳</div><div><span class="stat-val">${pend.length}</span><span class="stat-lbl">Pendentes</span></div></div>
      <div class="stat c-purple"><div class="stat-ico">🎁</div><div><span class="stat-val">${cort.length}</span><span class="stat-lbl">Cortesias</span></div></div>
      <div class="stat c-teal"><div class="stat-ico">📈</div><div><span class="stat-val">${fmtBRL(receita)}</span><span class="stat-lbl">Receita Estimada</span></div></div>
      <div class="stat c-red"><div class="stat-ico">💸</div><div><span class="stat-val">${fmtBRL(totalG)}</span><span class="stat-lbl">Total Gastos</span></div></div>
    </div>

    ${recentes.length ? `
    <h3 style="margin-bottom:14px;color:var(--text2);font-size:15px">Últimas inscrições</h3>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Nome</th><th>Telefone</th><th>Forma Pgto</th><th>Status</th></tr></thead>
        <tbody>
          ${recentes.map(i=>`
          <tr>
            <td><strong>${i.nome}</strong></td>
            <td>${i.telefone}</td>
            <td>${i.formaPagamento||'-'}</td>
            <td><span class="badge ${statusClass(i.status)}">${statusLabel(i.status)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : '<div class="empty"><div class="ico">📋</div><p>Nenhuma inscrição ainda.</p></div>'}
  </div>`;
}

// ══════════════════════════════════════════════════════
//  INSCRIÇÕES
// ══════════════════════════════════════════════════════
let inscFiltroStatus = 'todos';
let inscBusca = '';

function renderInscricoes(){
  const publicLink = `${location.origin}/GestorDeCursos/#/inscricao`;
  const filtradas = inscricoes.filter(i=>{
    const mb = !inscBusca || (i.nome||'').toLowerCase().includes(inscBusca.toLowerCase()) || (i.email||'').toLowerCase().includes(inscBusca.toLowerCase()) || (i.telefone||'').includes(inscBusca);
    const ms = inscFiltroStatus==='todos' || i.status===inscFiltroStatus;
    return mb && ms;
  });

  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div><h1>Inscrições</h1><p>${inscricoes.length} inscrito(s) no total</p></div>
      <div class="hdr-actions">
        <button class="btn btn-outline" onclick="toggleLinkCard()">🔗 Link Público</button>
        <button class="btn btn-primary" onclick="openAddInsc()">➕ Adicionar</button>
      </div>
    </div>

    <div id="link-card-wrap" class="hidden">
      <div class="link-card">
        <div class="link-info">
          <span class="link-lbl">Link de inscrição para alunos</span>
          <code class="link-url">${publicLink}</code>
          <button class="btn btn-outline btn-sm" onclick="copyText('${publicLink}')">📋 Copiar</button>
        </div>
      </div>
    </div>

    <div class="filters">
      <div class="search-box">
        <span>🔍</span>
        <input placeholder="Buscar por nome, email ou telefone..." value="${inscBusca}" oninput="inscBusca=this.value;renderInscricoes()" />
      </div>
      <select class="filter-sel" onchange="inscFiltroStatus=this.value;renderInscricoes()">
        <option value="todos" ${inscFiltroStatus==='todos'?'selected':''}>Todos os status</option>
        <option value="pendente" ${inscFiltroStatus==='pendente'?'selected':''}>Pendente</option>
        <option value="pago_pix" ${inscFiltroStatus==='pago_pix'?'selected':''}>Pago PIX</option>
        <option value="pago_cartao" ${inscFiltroStatus==='pago_cartao'?'selected':''}>Pago Cartão</option>
        <option value="cortesia" ${inscFiltroStatus==='cortesia'?'selected':''}>Cortesia</option>
      </select>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Instagram</th><th>Perfil</th><th>Faculdade</th><th>Pgto</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
          ${filtradas.length===0 ? `<tr><td colspan="9" class="empty-row">Nenhuma inscrição encontrada</td></tr>` :
            filtradas.map(i=>`
            <tr>
              <td><strong>${i.nome||''}</strong></td>
              <td style="font-size:12px">${i.email||''}</td>
              <td>${i.telefone||''}</td>
              <td>${i.instagram?'@'+i.instagram.replace('@',''):'-'}</td>
              <td><span class="badge ${i.perfil==='formado'?'b-teal':'b-orange'}">${i.perfil==='formado'?'Formado':'Estudante'}</span></td>
              <td style="font-size:12px;color:var(--text2)">${i.faculdade||'-'}</td>
              <td style="font-size:12px">${i.formaPagamento||'-'}</td>
              <td>
                <select class="sts-sel sts-${i.status}" onchange="updateStatus('${i.id}',this.value,this)">
                  <option value="pendente" ${i.status==='pendente'?'selected':''}>Pendente</option>
                  <option value="pago_pix" ${i.status==='pago_pix'?'selected':''}>Pago PIX</option>
                  <option value="pago_cartao" ${i.status==='pago_cartao'?'selected':''}>Pago Cartão</option>
                  <option value="cortesia" ${i.status==='cortesia'?'selected':''}>Cortesia</option>
                </select>
              </td>
              <td>
                <div style="display:flex;gap:5px">
                  <button class="ico-btn edit" onclick="openEditInsc('${i.id}')" title="Editar">✏️</button>
                  <button class="ico-btn" onclick="deleteInsc('${i.id}')" title="Remover">🗑️</button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function toggleLinkCard(){
  document.getElementById('link-card-wrap')?.classList.toggle('hidden');
}

function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>toast('Copiado!'));
}

async function updateStatus(id, status, sel){
  sel.className = `sts-sel sts-${status}`;
  await db.collection('inscricoes').doc(id).update({status});
  toast('Status atualizado');
}

async function deleteInsc(id){
  if(!confirm('Remover inscrição?')) return;
  await db.collection('inscricoes').doc(id).delete();
  toast('Removido');
}

// Modal inscrição
function openAddInsc(){ openInscModal(null) }
function openEditInsc(id){ openInscModal(inscricoes.find(i=>i.id===id)) }

function openInscModal(insc){
  const ed = !!insc;
  const d = insc||{nome:'',email:'',telefone:'',instagram:'',perfil:'formado',faculdade:'',formaPagamento:'PIX',status:'pendente'};
  document.body.insertAdjacentHTML('beforeend',`
  <div class="overlay" id="insc-modal" onclick="closeIfOverlay(event,'insc-modal')">
    <div class="modal">
      <h2>${ed?'Editar Inscrição':'Nova Inscrição'}</h2>
      <div class="form-grid">
        <div class="field full"><label>Nome *</label><input id="if-nome" value="${d.nome||''}" placeholder="Nome completo"/></div>
        <div class="field"><label>Email *</label><input id="if-email" type="email" value="${d.email||''}" placeholder="email@exemplo.com"/></div>
        <div class="field"><label>Telefone *</label><input id="if-tel" value="${d.telefone||''}" placeholder="(79) 99999-9999"/></div>
        <div class="field"><label>Instagram</label><input id="if-insta" value="${d.instagram||''}" placeholder="@usuario"/></div>
        <div class="field"><label>Perfil</label>
          <select id="if-perfil">
            <option value="formado" ${d.perfil==='formado'?'selected':''}>Formado</option>
            <option value="estudante" ${d.perfil==='estudante'?'selected':''}>Estudante</option>
          </select>
        </div>
        <div class="field"><label>Faculdade</label><input id="if-fac" value="${d.faculdade||''}" placeholder="Nome da faculdade"/></div>
        <div class="field"><label>Forma de Pagamento</label>
          <select id="if-pgto">
            ${['PIX','Cartão de Crédito','Cartão de Débito','Cortesia'].map(f=>`<option ${d.formaPagamento===f?'selected':''}>${f}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Status</label>
          <select id="if-status">
            <option value="pendente" ${d.status==='pendente'?'selected':''}>Pendente</option>
            <option value="pago_pix" ${d.status==='pago_pix'?'selected':''}>Pago PIX</option>
            <option value="pago_cartao" ${d.status==='pago_cartao'?'selected':''}>Pago Cartão</option>
            <option value="cortesia" ${d.status==='cortesia'?'selected':''}>Cortesia</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('insc-modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveInsc('${insc?.id||''}')">Salvar</button>
      </div>
    </div>
  </div>`);
}

async function saveInsc(id){
  const nome  = document.getElementById('if-nome').value.trim();
  const email = document.getElementById('if-email').value.trim();
  const tel   = document.getElementById('if-tel').value.trim();
  if(!nome||!email||!tel){ toast('Preencha nome, email e telefone','err'); return; }
  const data = {
    nome, email, telefone:tel,
    instagram: document.getElementById('if-insta').value.trim(),
    perfil: document.getElementById('if-perfil').value,
    faculdade: document.getElementById('if-fac').value.trim(),
    formaPagamento: document.getElementById('if-pgto').value,
    status: document.getElementById('if-status').value,
  };
  if(id){ await db.collection('inscricoes').doc(id).update(data); toast('Atualizado!'); }
  else   { await db.collection('inscricoes').add({...data, criadoEm: firebase.firestore.FieldValue.serverTimestamp()}); toast('Inscrição adicionada!'); }
  closeModal('insc-modal');
}

// ══════════════════════════════════════════════════════
//  GASTOS
// ══════════════════════════════════════════════════════
const CATS_GASTO = ['Local/Espaço','Material didático','Coffee break','Equipamento','Divulgação','Transporte','Hospedagem','Outros'];

function renderGastos(){
  const total = gastos.reduce((s,g)=>s+(g.valor||0),0);
  const porCat = CATS_GASTO.map(c=>({cat:c, items:gastos.filter(g=>g.categoria===c)})).filter(c=>c.items.length);

  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div><h1>Gastos do Evento</h1><p>${gastos.length} lançamento(s)</p></div>
      <div class="hdr-actions">
        <span class="total-tag">Total: ${fmtBRL(total)}</span>
        <button class="btn btn-primary" onclick="openAddGasto()">➕ Novo Gasto</button>
      </div>
    </div>
    ${porCat.length===0 ? `<div class="empty"><div class="ico">💸</div><p>Nenhum gasto registrado.</p></div>` : `
    <div class="gastos-grid">
      ${porCat.map(({cat,items})=>{
        const catTotal = items.reduce((s,g)=>s+(g.valor||0),0);
        return `
        <div class="gasto-cat">
          <div class="gasto-cat-hdr"><span class="gasto-cat-name">${cat}</span><span class="gasto-cat-total">${fmtBRL(catTotal)}</span></div>
          ${items.map(g=>`
          <div class="gasto-item">
            <span class="gasto-desc">${g.descricao}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="gasto-val">${fmtBRL(g.valor)}</span>
              <button class="ico-btn" onclick="deleteGasto('${g.id}')">🗑️</button>
            </div>
          </div>`).join('')}
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

function openAddGasto(){
  document.body.insertAdjacentHTML('beforeend',`
  <div class="overlay" id="gasto-modal" onclick="closeIfOverlay(event,'gasto-modal')">
    <div class="modal">
      <h2>Novo Gasto</h2>
      <div class="form-grid">
        <div class="field full"><label>Descrição *</label><input id="gf-desc" placeholder="Ex: Aluguel de sala"/></div>
        <div class="field"><label>Categoria</label>
          <select id="gf-cat">${CATS_GASTO.map(c=>`<option>${c}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Valor (R$) *</label><input id="gf-val" placeholder="0,00" /></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('gasto-modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveGasto()">Salvar</button>
      </div>
    </div>
  </div>`);
}

async function saveGasto(){
  const desc = document.getElementById('gf-desc').value.trim();
  const val  = parseFloat(document.getElementById('gf-val').value.replace(',','.'));
  if(!desc||isNaN(val)){ toast('Preencha descrição e valor','err'); return; }
  await db.collection('gastos').add({ descricao:desc, categoria:document.getElementById('gf-cat').value, valor:val, criadoEm:firebase.firestore.FieldValue.serverTimestamp() });
  toast('Gasto salvo!');
  closeModal('gasto-modal');
}

async function deleteGasto(id){
  if(!confirm('Remover gasto?')) return;
  await db.collection('gastos').doc(id).delete();
  toast('Removido');
}

// ══════════════════════════════════════════════════════
//  MATERIAIS
// ══════════════════════════════════════════════════════
const CATS_MAT = ['Apostila','Slides','Vídeos','Formulários','Avaliações','Outros'];

function renderMateriais(){
  const porCat = CATS_MAT.map(c=>({cat:c, items:materiais.filter(m=>m.categoria===c)})).filter(c=>c.items.length);

  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div><h1>Materiais do Curso</h1><p>${materiais.length} link(s) cadastrado(s)</p></div>
      <button class="btn btn-primary" onclick="openAddMat()">➕ Adicionar Material</button>
    </div>
    ${porCat.length===0 ? `<div class="empty"><div class="ico">📁</div><p>Nenhum material cadastrado. Adicione links do Google Drive, YouTube etc.</p></div>` : `
    <div class="mat-grid">
      ${porCat.map(({cat,items})=>`
      <div class="mat-cat">
        <div class="mat-cat-title">${cat}</div>
        <div class="mat-list">
          ${items.map(m=>`
          <div class="mat-item">
            <div class="mat-info">
              <span class="mat-nome">${m.nome}</span>
              ${m.descricao?`<span class="mat-desc">${m.descricao}</span>`:''}
              <a href="${m.url}" target="_blank" class="mat-link">🔗 Abrir link</a>
            </div>
            <button class="ico-btn" onclick="deleteMat('${m.id}')">🗑️</button>
          </div>`).join('')}
        </div>
      </div>`).join('')}
    </div>`}
  </div>`;
}

function openAddMat(){
  document.body.insertAdjacentHTML('beforeend',`
  <div class="overlay" id="mat-modal" onclick="closeIfOverlay(event,'mat-modal')">
    <div class="modal">
      <h2>Novo Material</h2>
      <div class="form-grid">
        <div class="field full"><label>Nome *</label><input id="mf-nome" placeholder="Ex: Apostila de Joelho"/></div>
        <div class="field full"><label>URL *</label><input id="mf-url" placeholder="https://drive.google.com/..."/></div>
        <div class="field"><label>Categoria</label>
          <select id="mf-cat">${CATS_MAT.map(c=>`<option>${c}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Descrição (opcional)</label><input id="mf-desc" placeholder="Breve descrição"/></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('mat-modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveMat()">Salvar</button>
      </div>
    </div>
  </div>`);
}

async function saveMat(){
  const nome = document.getElementById('mf-nome').value.trim();
  const url  = document.getElementById('mf-url').value.trim();
  if(!nome||!url){ toast('Preencha nome e URL','err'); return; }
  await db.collection('materiais').add({ nome, url, categoria:document.getElementById('mf-cat').value, descricao:document.getElementById('mf-desc').value.trim(), criadoEm:firebase.firestore.FieldValue.serverTimestamp() });
  toast('Material adicionado!');
  closeModal('mat-modal');
}

async function deleteMat(id){
  if(!confirm('Remover material?')) return;
  await db.collection('materiais').doc(id).delete();
  toast('Removido');
}

// ══════════════════════════════════════════════════════
//  CONFIG CURSO
// ══════════════════════════════════════════════════════
function renderConfig(){
  const c = curso||{};
  const publicLink = `${location.origin}/GestorDeCursos/#/inscricao`;
  document.getElementById('main-content').innerHTML = `
  <div class="page fade-in">
    <div class="page-hdr">
      <div><h1>Configurar Curso</h1><p>Dados do curso ativo e pagamento</p></div>
      <button class="btn btn-primary" onclick="saveConfig()">💾 Salvar</button>
    </div>
    <div class="config-sections">

      <div class="config-sec">
        <h2>Informações do Curso</h2>
        <div class="form-grid">
          <div class="field full"><label>Nome do Curso</label><input id="cf-nome" value="${c.nome||''}" placeholder="Ex: Treinamento em Exercícios Terapêuticos — 6ª Edição"/></div>
          <div class="field"><label>Data</label><input id="cf-data" value="${c.data||''}" placeholder="Ex: 29 e 30 de agosto de 2026"/></div>
          <div class="field"><label>Local</label><input id="cf-local" value="${c.local||''}" placeholder="Ex: Aracaju, SE"/></div>
          <div class="field"><label>Vagas</label><input id="cf-vagas" type="number" value="${c.vagas||''}" placeholder="0"/></div>
          <div class="field full"><label>Descrição (aparece na página pública)</label><textarea id="cf-desc">${c.descricao||''}</textarea></div>
        </div>
      </div>

      <div class="config-sec">
        <h2>PIX</h2>
        <div class="form-grid">
          <div class="field full"><label>Chave PIX</label><input id="cf-pix" value="${c.chavePix||''}" placeholder="CPF, CNPJ, email ou chave aleatória"/></div>
          <div class="field full"><label>Nome do titular (PIX)</label><input id="cf-pixnome" value="${c.nomePix||''}" placeholder="Felipe Cerqueira"/></div>
        </div>
      </div>

      <div class="config-sec">
        <h2>Valores — Tabela Normal</h2>
        <div class="form-grid">
          <div class="field"><label>À vista PIX (R$)</label><input id="cf-v-avista" type="number" value="${c.vAvista||''}" placeholder="400"/></div>
          <div class="field"><label>3x no PIX (R$ total)</label><input id="cf-v-pix3x" type="number" value="${c.vPix3x||''}" placeholder="400"/></div>
          <div class="field"><label>PIX 3x — Parcela 1 (R$)</label><input id="cf-pix-p1" type="number" value="${c.pixP1||''}" placeholder="150"/></div>
          <div class="field"><label>PIX 3x — Parcela 2 (R$)</label><input id="cf-pix-p2" type="number" value="${c.pixP2||''}" placeholder="150"/></div>
          <div class="field"><label>PIX 3x — Parcela 3 (R$)</label><input id="cf-pix-p3" type="number" value="${c.pixP3||''}" placeholder="100"/></div>
          <div class="field"><label>Cartão (até 10x) — R$ total</label><input id="cf-v-cartao" type="number" value="${c.vCartao||''}" placeholder="450"/></div>
          <div class="field full"><label>Link cartão normal</label><input id="cf-link-cartao" value="${c.linkCartao||''}" placeholder="https://hotmart.com/..."/></div>
        </div>
      </div>

      <div class="config-sec">
        <h2>Valores — Plano Fidelidade (5% desconto)</h2>
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Para assinantes OrtoFlix ou alunos de turmas 2025/2026</p>
        <div class="form-grid">
          <div class="field"><label>À vista PIX fidelidade (R$)</label><input id="cf-f-avista" type="number" value="${c.fAvista||''}" placeholder="380"/></div>
          <div class="field"><label>3x no PIX fidelidade (R$ total)</label><input id="cf-f-pix3x" type="number" value="${c.fPix3x||''}" placeholder="380"/></div>
          <div class="field"><label>Cartão fidelidade (até 10x) — R$ total</label><input id="cf-f-cartao" type="number" value="${c.fCartao||''}" placeholder="430"/></div>
          <div class="field full"><label>Link cartão fidelidade</label><input id="cf-link-cartao-f" value="${c.linkCartaoFid||''}" placeholder="https://hotmart.com/..."/></div>
        </div>
      </div>

      <div class="config-sec">
        <h2>Textos de Regras (aparecem na inscrição)</h2>
        <div class="form-grid">
          <div class="field full"><label>Regras do parcelamento no PIX</label><textarea id="cf-regras-pix" rows="5" placeholder="Ex: A primeira parcela deve ser de R$150...">${c.regrasPix||'- A primeira parcela deve ser de R$150, paga no momento da inscrição.\n- A segunda parcela deve ser de R$150, paga OBRIGATORIAMENTE até 05/07.\n- A terceira parcela deve ser de R$100, paga OBRIGATORIAMENTE até 05/08.\n- A confirmação fica condicionada ao pagamento da primeira parcela.\n- O não pagamento no prazo caracteriza abandono da inscrição.'}</textarea></div>
          <div class="field full"><label>Política de cancelamento</label><textarea id="cf-regras-cancel" rows="4" placeholder="Ex: Em caso de desistência até 7 dias...">${c.regrasCancel||'- Em caso de desistência até 7 dias após o pagamento, o valor será reembolsado integralmente, desde que solicitado até 48 horas antes do início do curso.\n- Desistências após este período não serão reembolsadas.'}</textarea></div>
        </div>
      </div>

      <div class="config-sec">
        <h2>Link de Inscrição Pública</h2>
        <div class="link-card">
          <div class="link-info">
            <span class="link-lbl">Compartilhe com seus alunos</span>
            <code class="link-url">${publicLink}</code>
            <button class="btn btn-outline btn-sm" onclick="copyText('${publicLink}')">📋 Copiar Link</button>
          </div>
        </div>
      </div>

    </div>
  </div>`;
}

async function saveConfig(){
  const data = {
    nome:          document.getElementById('cf-nome').value.trim(),
    data:          document.getElementById('cf-data').value.trim(),
    local:         document.getElementById('cf-local').value.trim(),
    vagas:         parseInt(document.getElementById('cf-vagas').value)||0,
    descricao:     document.getElementById('cf-desc').value.trim(),
    chavePix:      document.getElementById('cf-pix').value.trim(),
    nomePix:       document.getElementById('cf-pixnome').value.trim(),
    // valores normais
    vAvista:       parseFloat(document.getElementById('cf-v-avista').value)||0,
    vPix3x:        parseFloat(document.getElementById('cf-v-pix3x').value)||0,
    pixP1:         parseFloat(document.getElementById('cf-pix-p1').value)||0,
    pixP2:         parseFloat(document.getElementById('cf-pix-p2').value)||0,
    pixP3:         parseFloat(document.getElementById('cf-pix-p3').value)||0,
    vCartao:       parseFloat(document.getElementById('cf-v-cartao').value)||0,
    linkCartao:    document.getElementById('cf-link-cartao').value.trim(),
    // valores fidelidade
    fAvista:       parseFloat(document.getElementById('cf-f-avista').value)||0,
    fPix3x:        parseFloat(document.getElementById('cf-f-pix3x').value)||0,
    fCartao:       parseFloat(document.getElementById('cf-f-cartao').value)||0,
    linkCartaoFid: document.getElementById('cf-link-cartao-f').value.trim(),
    // regras
    regrasPix:     document.getElementById('cf-regras-pix').value.trim(),
    regrasCancel:  document.getElementById('cf-regras-cancel').value.trim(),
  };
  await db.collection('config').doc('curso').set(data, { merge: true });
  toast('Configurações salvas!');
}

// ══════════════════════════════════════════════════════
//  PÁGINA PÚBLICA DE INSCRIÇÃO
// ══════════════════════════════════════════════════════
let pubCurso = null;
let pubPgto = 'avista';       // avista | pix3x | cartao
let pubFidelidade = 'nao';    // nao | sim
let pubNome = '';
let pubAceitePix = false;
let pubAceiteCancel = false;

function showPublicPage(){
  hide('loading-screen'); hide('app'); hide('login-page');
  show('public-page');
  db.collection('config').doc('curso').get().then(snap=>{
    pubCurso = snap.exists ? snap.data() : null;
    renderPublicForm();
  });
}

function getValor(){
  const c = pubCurso||{};
  const fid = pubFidelidade === 'sim';
  if(pubPgto === 'avista')  return fmtBRL(fid ? c.fAvista  : c.vAvista);
  if(pubPgto === 'pix3x')   return fmtBRL(fid ? c.fPix3x   : c.vPix3x);
  if(pubPgto === 'cartao')  return fmtBRL(fid ? c.fCartao  : c.vCartao);
  return '';
}

function renderPublicForm(){
  const c = pubCurso||{};
  const regrasPix    = (c.regrasPix||'').split('\n').filter(Boolean);
  const regrasCancel = (c.regrasCancel||'').split('\n').filter(Boolean);

  document.getElementById('public-page').innerHTML = `
  <div class="pub-card fade-in">
    <div class="pub-hdr">
      <span class="ico">🎓</span>
      <h1>${c.nome||'Inscrição'}</h1>
      ${c.descricao?`<p class="pub-desc">${c.descricao}</p>`:''}
      <div class="pub-meta">
        ${c.data?`<span>📅 ${c.data}</span>`:''}
        ${c.local?`<span>📍 ${c.local}</span>`:''}
      </div>
    </div>

    <div class="pub-form">
      <h2>Tabela de Valores</h2>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;font-size:14px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px">
            <div style="font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">À vista (PIX)</div>
            <div style="font-weight:700;font-family:'Syne',sans-serif;color:var(--green)">${fmtBRL(c.vAvista)}</div>
          </div>
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px">
            <div style="font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">3x no PIX</div>
            <div style="font-weight:700;font-family:'Syne',sans-serif;color:var(--blue)">${fmtBRL(c.vPix3x)}</div>
          </div>
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px">
            <div style="font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Cartão 10x</div>
            <div style="font-weight:700;font-family:'Syne',sans-serif;color:var(--accent)">${fmtBRL(c.vCartao)}</div>
          </div>
        </div>
        <div style="margin-top:10px;padding:10px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:8px;font-size:13px;color:var(--purple)">
          🤝 <strong>Plano Fidelidade (5% off):</strong> À vista/3x PIX ${fmtBRL(c.fAvista)} · Cartão 10x ${fmtBRL(c.fCartao)}
        </div>
      </div>

      <h2 style="margin-bottom:16px">Formulário de Inscrição</h2>
      <div class="form-grid">
        <div class="field full"><label>Nome completo *</label><input id="pf-nome" placeholder="Seu nome completo"/></div>
        <div class="field"><label>Email *</label><input id="pf-email" type="email" placeholder="seu@email.com"/></div>
        <div class="field"><label>Telefone / WhatsApp *</label><input id="pf-tel" placeholder="(79) 99999-9999"/></div>
        <div class="field"><label>Instagram</label><input id="pf-insta" placeholder="@seuusuario"/></div>
        <div class="field"><label>Você é:</label>
          <select id="pf-perfil">
            <option value="formado">Fisioterapeuta formado</option>
            <option value="estudante">Estudante de fisioterapia</option>
          </select>
        </div>
        <div class="field"><label>Faculdade</label><input id="pf-fac" placeholder="Nome da sua faculdade"/></div>

        <div class="field full">
          <label>Plano Fidelidade</label>
          <div class="radio-group" id="radio-fid">
            <label class="radio-opt selected" onclick="selectFid(this,'nao')"><input type="radio" name="fid" style="display:none" checked> Não se aplica</label>
            <label class="radio-opt" onclick="selectFid(this,'sim')"><input type="radio" name="fid" style="display:none"> 🤝 Sou assinante OrtoFlix ou fiz curso em 2025/2026</label>
          </div>
        </div>

        <div class="field full">
          <label>Forma de pagamento</label>
          <div class="radio-group" id="radio-pgto">
            <label class="radio-opt selected" onclick="selectPgto(this,'avista')"><input type="radio" name="pgto" style="display:none" checked> PIX à vista</label>
            <label class="radio-opt" onclick="selectPgto(this,'pix3x')"><input type="radio" name="pgto" style="display:none"> 3x no PIX</label>
            <label class="radio-opt" onclick="selectPgto(this,'cartao')"><input type="radio" name="pgto" style="display:none"> Cartão (até 10x)</label>
          </div>
          <div id="valor-preview" style="margin-top:10px;padding:10px 14px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:8px;font-size:14px;font-weight:600;color:var(--accent)">
            💰 Valor: ${getValor()}
          </div>
        </div>
      </div>

      <div id="bloco-pix3x" style="display:none;margin:16px 0;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:16px">
        <p style="font-weight:700;font-size:14px;margin-bottom:10px">⚠️ Regras do parcelamento no PIX</p>
        ${regrasPix.map(r=>`<p style="font-size:13px;color:var(--text2);margin-bottom:4px">${r}</p>`).join('')}
        <label style="display:flex;align-items:center;gap:8px;margin-top:12px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="aceite-pix" onchange="pubAceitePix=this.checked" style="accent-color:var(--accent);width:16px;height:16px">
          Estou ciente e aceito as condições do parcelamento no PIX.
        </label>
      </div>

      <div style="margin:16px 0;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:16px">
        <p style="font-weight:700;font-size:14px;margin-bottom:10px">📋 Política de Cancelamento</p>
        ${regrasCancel.map(r=>`<p style="font-size:13px;color:var(--text2);margin-bottom:4px">${r}</p>`).join('')}
        <label style="display:flex;align-items:center;gap:8px;margin-top:12px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="aceite-cancel" onchange="pubAceiteCancel=this.checked" style="accent-color:var(--accent);width:16px;height:16px">
          Estou ciente e aceito a política de cancelamento.
        </label>
      </div>

      <div style="background:var(--bg3);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2);margin-bottom:16px">
        ⚠️ A inscrição só terá validade mediante pagamento em até <strong>48 horas</strong>. Após este período a vaga será liberada.
      </div>

      <button class="btn btn-primary btn-full" id="pub-submit-btn" onclick="submitInscricao()">Confirmar Inscrição</button>
    </div>
  </div>`;
}

function selectPgto(el, val){
  pubPgto = val;
  document.querySelectorAll('#radio-pgto .radio-opt').forEach(r=>r.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('bloco-pix3x').style.display = val==='pix3x' ? 'block' : 'none';
  document.getElementById('valor-preview').innerHTML = `💰 Valor: ${getValor()}`;
}

function selectFid(el, val){
  pubFidelidade = val;
  document.querySelectorAll('#radio-fid .radio-opt').forEach(r=>r.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('valor-preview').innerHTML = `💰 Valor: ${getValor()}`;
}

async function submitInscricao(){
  const nome  = document.getElementById('pf-nome').value.trim();
  const email = document.getElementById('pf-email').value.trim();
  const tel   = document.getElementById('pf-tel').value.trim();
  if(!nome||!email||!tel){ toast('Preencha nome, email e telefone','err'); return; }
  if(!/\S+@\S+\.\S+/.test(email)){ toast('Email inválido','err'); return; }
  if(pubPgto==='pix3x' && !pubAceitePix){ toast('Aceite as regras do parcelamento no PIX','err'); return; }
  if(!pubAceiteCancel){ toast('Aceite a política de cancelamento','err'); return; }
  const btn = document.getElementById('pub-submit-btn');
  btn.textContent='Enviando...'; btn.disabled=true;
  const c = pubCurso||{};
  const fid = pubFidelidade==='sim';
  let valorFinal = 0;
  if(pubPgto==='avista') valorFinal = fid ? c.fAvista : c.vAvista;
  if(pubPgto==='pix3x')  valorFinal = fid ? c.fPix3x  : c.vPix3x;
  if(pubPgto==='cartao') valorFinal = fid ? c.fCartao : c.vCartao;
  const pgtoLabel = {avista:'PIX à vista', pix3x:'3x no PIX', cartao:'Cartão (até 10x)'}[pubPgto];
  try{
    await db.collection('inscricoes').add({
      nome, email, telefone:tel,
      instagram:    document.getElementById('pf-insta').value.trim(),
      perfil:       document.getElementById('pf-perfil').value,
      faculdade:    document.getElementById('pf-fac').value.trim(),
      formaPagamento: pgtoLabel,
      fidelidade:   pubFidelidade,
      valorFinal,
      status: 'pendente',
      criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });
    pubNome = nome;
    renderPublicConfirm();
  } catch(e){
    toast('Erro ao enviar. Tente novamente.','err');
    btn.textContent='Confirmar Inscrição'; btn.disabled=false;
  }
}

function renderPublicConfirm(){
  const c = pubCurso||{};
  const fid = pubFidelidade==='sim';
  const isCartao = pubPgto==='cartao';
  const isPix3x  = pubPgto==='pix3x';
  const linkCartao = fid ? c.linkCartaoFid : c.linkCartao;
  let valorLabel = getValor();
  const regrasPix = (c.regrasPix||'').split('\n').filter(Boolean);

  document.getElementById('public-page').innerHTML = `
  <div class="confirm-card fade-in">
    <div class="confirm-ico">✅</div>
    <h1>Inscrição Recebida!</h1>
    <p class="sub">Olá, <strong>${pubNome}</strong>! Sua inscrição em <strong>${c.nome||'nosso curso'}</strong> foi registrada.</p>
    <p class="sub" style="margin-top:10px;font-weight:600;color:var(--text)">Finalize o pagamento para confirmar sua vaga:</p>
    ${fid?`<p style="font-size:13px;color:var(--purple);margin-top:4px">🤝 Plano Fidelidade aplicado</p>`:''}

    ${!isCartao ? `
    <div class="pix-box" style="margin-top:16px">
      <div class="pix-box-hdr"><span style="background:var(--green);color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:800">PIX</span> Pagamento via PIX</div>
      <p class="pix-lbl">Chave PIX:</p>
      <div class="pix-key-row">
        <code>${c.chavePix||'Não configurada'}</code>
        <button class="ico-btn" onclick="navigator.clipboard.writeText('${c.chavePix||''}').then(()=>toast('Copiado!'))">📋</button>
      </div>
      ${c.nomePix?`<p style="font-size:13px;color:var(--text2);margin-top:4px">Titular: <strong>${c.nomePix}</strong></p>`:''}
      <p style="font-size:14px;font-weight:700;color:var(--green);margin-top:8px">Valor: ${valorLabel}</p>
      ${isPix3x ? `
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(16,185,129,.2)">
        <p style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px">PARCELAS:</p>
        ${c.pixP1?`<p style="font-size:13px">• 1ª parcela: <strong>${fmtBRL(fid?c.pixP1*(c.fPix3x/c.vPix3x):c.pixP1)}</strong> — no ato da inscrição</p>`:''}
        ${c.pixP2?`<p style="font-size:13px">• 2ª parcela: <strong>${fmtBRL(fid?c.pixP2*(c.fPix3x/c.vPix3x):c.pixP2)}</strong></p>`:''}
        ${c.pixP3?`<p style="font-size:13px">• 3ª parcela: <strong>${fmtBRL(fid?c.pixP3*(c.fPix3x/c.vPix3x):c.pixP3)}</strong></p>`:''}
      </div>` : ''}
      <p class="pix-obs">Após o pagamento, envie o comprovante por e-mail ou Instagram (@fccursos).</p>
    </div>` : `
    <div class="cartao-box" style="margin-top:16px">
      <div class="cartao-box-hdr">💳 Pagamento via Cartão — até 10x</div>
      <p style="font-size:14px;font-weight:700;color:var(--blue);margin-bottom:12px">Valor: ${valorLabel}</p>
      ${linkCartao ? `<a href="${linkCartao}" target="_blank" class="btn btn-primary btn-full" style="margin-top:0">Clique aqui para pagar no cartão</a>` : '<p style="color:var(--text2);font-size:14px">Entre em contato para realizar o pagamento.</p>'}
    </div>`}

    ${(c.data||c.local)?`
    <div class="info-box">
      ${c.data?`<p>📅 <strong>${c.data}</strong></p>`:''}
      ${c.local?`<p>📍 <strong>${c.local}</strong></p>`:''}
    </div>`:''}

    <div style="margin-top:16px;padding:14px 16px;background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.2);border-radius:10px;font-size:13px;color:var(--text2);text-align:center">
      Dúvidas ou mais informações? Fale conosco pelo Instagram:
      <a href="https://instagram.com/fccursos" target="_blank" style="color:var(--accent);font-weight:700;display:block;margin-top:4px;font-size:15px">@fccursos</a>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════════════
function closeModal(id){ document.getElementById(id)?.remove() }
function closeIfOverlay(e, id){ if(e.target.classList.contains('overlay')) closeModal(id) }
</script>
</body>
</html>
