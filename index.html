<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FisioQ by OrtoFlix</title>
    <link rel="manifest" href="/FisioQ/manifest.json"/>
    <meta name="theme-color" content="#0B1E3D"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="FisioQ"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/FisioQ/icon-32.png"/>
    <link rel="apple-touch-icon" href="/FisioQ/icon-180.png"/>
    <link rel="apple-touch-icon" sizes="192x192" href="/FisioQ/icon-192.png"/>
    <link rel="apple-touch-icon" sizes="512x512" href="/FisioQ/icon-512.png"/>
    <script type="module" crossorigin src="/FisioQ/app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if('serviceWorker' in navigator){
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/FisioQ/sw.js')
            .then(() => console.log('SW registered'))
            .catch(e => console.log('SW error:', e));
        });
      }
    </script>
  </body>
</html>
